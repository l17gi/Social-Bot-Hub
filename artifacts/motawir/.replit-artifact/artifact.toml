kind = "web"
previewPath = "/"
title = "المطور - منصة أتمتة التواصل الاجتماعي"
version = "1.0.0"
id = "artifacts/motawir"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21313

[services.development]
run = "pnpm --filter @workspace/motawir run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/motawir", "run", "build" ]
publicDir = "artifacts/motawir/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21313"
BASE_PATH = "/"
